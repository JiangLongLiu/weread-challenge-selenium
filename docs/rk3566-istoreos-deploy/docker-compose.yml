services:
  app:
    image: jqknono/weread-challenge:v0.13.0
    pull_policy: always
    environment:
      - WEREAD_REMOTE_BROWSER=http://selenium:4444
      - WEREAD_DURATION=68
    volumes:
      - ./data:/app/data
    depends_on:
      selenium:
        condition: service_started
    dns:
      - 223.5.5.5
    restart: unless-stopped
  selenium:
    image: selenium/standalone-chromium:144.0
    pull_policy: if_not_present
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SE_ENABLE_TRACING=false
      - SE_BIND_HOST=false
      - SE_JAVA_DISABLE_HOSTNAME_VERIFICATION=false
      - SE_VNC_PASSWORD=111111
    dns:
      - 223.5.5.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://selenium:4444/status"]
      interval: 5s
      timeout: 60s
      retries: 10
