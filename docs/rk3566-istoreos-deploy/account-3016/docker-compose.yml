services:
  app:
    image: jqknono/weread-challenge:v0.13.0
    pull_policy: never
    network_mode: host
    environment:
      - WEREAD_REMOTE_BROWSER=http://127.0.0.1:4444
      - WEREAD_DURATION=68
    volumes:
      - ./data:/app/data
    restart: unless-stopped
  # 复用 4735 的 Selenium 容器，不单独启动
  selenium:
    image: selenium/standalone-chromium:144.0
    pull_policy: never
    # 使用 sleep 使容器启动但不占用端口
    command: sleep infinity
